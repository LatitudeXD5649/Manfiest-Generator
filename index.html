<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional MC Manifest Generator</title>
    <style>
        body { font-family: sans-serif; background: #141414; color: #dae0e6; margin: 0; padding: 20px 340px 20px 20px; display: flex; justify-content: center; box-sizing: border-box; transition: padding 0.3s; }
        .container { background: #1e1e1e; padding: 25px; border-radius: 12px; width: 100%; max-width: 650px; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
        h2 { margin: 0 0 20px; color: #4caf50; text-align: center; font-size: 22px; }
        .section { background: #252526; padding: 15px; border-radius: 6px; margin-bottom: 15px; border-left: 4px solid #4caf50; }
        .section-title { font-weight: bold; margin-bottom: 12px; color: #fff; display: flex; justify-content: space-between; align-items: center; }
        .form-group { margin-bottom: 12px; }
        .row { display: flex; gap: 10px; margin-bottom: 8px; }
        .col { flex: 1; }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: #aaa; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #444; border-radius: 4px; background: #2d2d2d; color: #fff; box-sizing: border-box; font-size: 14px; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #4caf50; }

        /* Floating Sidebar Panel (Responsive) */
        .floating-chart { position: fixed; bottom: 20px; right: 20px; width: 280px; background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid #333; box-shadow: 0 4px 20px rgba(0,0,0,0.6); z-index: 1000; display: flex; flex-direction: column; gap: 12px; transition: all 0.3s ease; }
        .chart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .chart-title { font-size: 14px; font-weight: bold; color: #4caf50; margin: 0; }
        .toggle-btn { background: #333; border: none; color: #fff; padding: 4px 8px; font-size: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .toggle-btn:hover { background: #444; }
        
        .color-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; max-height: 220px; overflow-y: auto; }
        .color-badge { padding: 6px; font-size: 11px; border-radius: 3px; cursor: pointer; user-select: none; font-weight: bold; border: 1px solid rgba(0,0,0,0.2); text-align: center; }
        
        /* Shorthand Color Mapping Rules */
        .color-badge[data-c="0"] { background: #000; color: #fff; } .color-badge[data-c="1"] { background: #00A; color: #fff; }
        .color-badge[data-c="2"] { background: #0A0; color: #fff; } .color-badge[data-c="3"] { background: #0AA; color: #fff; }
        .color-badge[data-c="4"] { background: #A00; color: #fff; } .color-badge[data-c="5"] { background: #A0A; color: #fff; }
        .color-badge[data-c="6"] { background: #FA0; color: #000; } .color-badge[data-c="7"] { background: #AAA; color: #000; }
        .color-badge[data-c="8"] { background: #555; color: #fff; } .color-badge[data-c="9"] { background: #55F; color: #fff; }
        .color-badge[data-c="a"] { background: #5F5; color: #000; } .color-badge[data-c="b"] { background: #5FF; color: #000; }
        .color-badge[data-c="c"] { background: #F55; color: #000; } .color-badge[data-c="d"] { background: #F5F; color: #000; }
        .color-badge[data-c="e"] { background: #FF5; color: #000; } .color-badge[data-c="f"] { background: #FFF; color: #000; }
        .color-badge[data-c="l"] { background: #333; color: #fff; font-weight: bold; }
        .color-badge[data-c="o"] { background: #333; color: #fff; font-style: italic; }
        .color-badge[data-c="r"] { background: #444; color: #fff; border: 1px dashed #777; grid-column: span 2; }

        .pro-tip-box { background: rgba(76, 175, 80, 0.08); border: 1px dashed rgba(76, 175, 80, 0.3); padding: 8px 10px; border-radius: 4px; font-size: 11px; line-height: 1.4; color: #b0b8c0; }
        .pro-tip-box strong { color: #4caf50; }

        /* Closed State Layout Modifications */
        .floating-chart.minimized { width: auto; padding: 8px; }
        .floating-chart.minimized .color-grid, .floating-chart.minimized .pro-tip-box, .floating-chart.minimized .chart-title { display: none; }

        .subpack-card { background: #2d2d2d; padding: 12px; border-radius: 6px; margin-bottom: 10px; border: 1px solid #444; }
        button { padding: 8px 12px; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-block { width: 100%; padding: 12px; font-size: 16px; background: #4caf50; margin-top: 10px; }
        .btn-danger { background: #d32f2f; } .btn-secondary { background: #444; font-size: 12px; padding: 4px 8px; }

        /* MOBILE RESPONSIVE MEDIA QUERIES */
        @media (max-width: 768px) {
            body { padding: 15px 15px 80px 15px; }
            .row { flex-direction: column; gap: 8px; }
            .floating-chart { left: 15px; right: 15px; bottom: 15px; width: auto; max-height: 50vh; }
            .floating-chart.minimized { left: auto; right: 15px; bottom: 15px; }
            .color-grid { max-height: 140px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Ultimate MC Manifest Generator</h2>
    
    <!-- PACK INFO -->
    <div class="section">
        <div class="section-title">Pack Info</div>
        <div class="form-group">
            <label>Pack Name</label>
            <input type="text" id="packName" placeholder="§bMy §lAwesome§r Pack" required>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="packDesc" rows="2" placeholder="§7Changes the look of swords..."></textarea>
        </div>

        <div class="row">
            <div class="col">
                <label>Pack Version</label>
                <div class="row"><input type="number" id="vMaj" value="1"><input type="number" id="vMin" value="0"><input type="number" id="vPat" value="0"></div>
            </div>
            <div class="col">
                <label>Min Engine Version</label>
                <div class="row"><input type="number" id="eMaj" value="1"><input type="number" id="eMin" value="20"><input type="number" id="ePat" value="0"></div>
            </div>
        </div>
    </div>

    <!-- METADATA -->
    <div class="section">
        <div class="section-title">Creator Metadata</div>
        <div class="form-group">
            <label>Authors (Separate with commas)</label>
            <input type="text" id="metaAuthors" placeholder="Steverino, AlexTheDev">
        </div>
        <div class="row">
            <div class="col">
                <label>Website / Project URL</label>
                <input type="url" id="metaUrl" placeholder="https://github.com/yourprofile">
            </div>
            <div class="col">
                <label>License</label>
                <input type="text" id="metaLicense" placeholder="CC BY-NC-ND 4.0">
            </div>
        </div>
    </div>

    <!-- PACK TYPE -->
    <div class="section">
        <div class="section-title">Pack Type</div>
        <select id="packType">
            <option value="resources">Resource Pack (Textures, Sounds, UI)</option>
            <option value="data">Behavior Pack (Entities, Functions)</option>
            <option value="skin_pack">Skin Pack</option>
        </select>
    </div>

    <!-- SUBPACKS -->
    <div class="section">
        <div class="section-title">
            <span>Subpacks (Optional Toggle Settings)</span>
            <button class="btn-secondary" type="button" onclick="addSubpack()">+ Add Subpack</button>
        </div>
        <div id="subpacks-container"></div>
    </div>

    <button class="btn-block" onclick="downloadManifest()">Download manifest.json</button>
</div>

<!-- FLOATING RESPONSIVE TOGGLEABLE COLOR CHART -->
<div class="floating-chart" id="chartPanel">
    <div class="chart-header">
        <h3 class="chart-title">Minecraft Format Codes</h3>
        <button class="toggle-btn" id="toggleBtn" onclick="toggleChart()">✕</button>
    </div>
    <div class="color-grid" id="colorGrid"></div>
    <div class="pro-tip-box">
        <strong>Pro-Tip:</strong> For advanced file formatting, open your project in <b>VS Code</b>, install the <b>Prettier</b> extension, and use it to auto-format your configurations seamlessly.
    </div>
</div>

<script>
    const colors = [['0','Black'],['1','Blue'],['2','Green'],['3','Cyan'],['4','Red'],['5','Purple'],['6','Gold'],['7','Gray'],['8','D.Gray'],['9','Indigo'],['a','L.Green'],['b','Aqua'],['c','L.Red'],['d','Pink'],['e','Yellow'],['f','White'],['l','Bold'],['o','Italic'],['r','Reset']];
    document.getElementById('colorGrid').innerHTML = colors.map(([c, n]) => `<span class="color-badge" data-c="${c}" onclick="insertCode('§${c}')">§${c} ${n}</span>`).join('');

    let isMinimized = false;
    function toggleChart() {
        const panel = document.getElementById('chartPanel');
        const btn = document.getElementById('toggleBtn');
        const body = document.body;
        
        isMinimized = !isMinimized;
        if (isMinimized) {
            panel.classList.add('minimized');
            btn.innerText = "🎨 Format Codes";
            if (window.innerWidth > 768) body.style.paddingRight = "20px";
        } else {
            panel.classList.remove('minimized');
            btn.innerText = "✕";
            if (window.innerWidth > 768) body.style.paddingRight = "340px";
        }
    }

    let activeInput = document.getElementById('packName');
    document.addEventListener('focusin', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') activeInput = e.target;
    });

    function insertCode(code) {
        if (!activeInput) return;
        const start = activeInput.selectionStart ?? activeInput.value.length;
        const end = activeInput.selectionEnd ?? activeInput.value.length;
        const text = activeInput.value;
        activeInput.value = text.slice(0, start) + code + text.slice(end);
        activeInput.focus();
        activeInput.selectionStart = activeInput.selectionEnd = start + code.length;
    }

    function genUUID() {
        return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c => (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
    }

    let subpackCount = 0;
    function addSubpack() {
        subpackCount++;
        const card = document.createElement('div');
        card.className = 'subpack-card';
        card.id = `subpack-${subpackCount}`;
        card.innerHTML = `
            <div class="row">
                <div class="col"><label>Folder Name</label><input type="text" class="sub-folder" placeholder="16x" required></div>
                <div class="col"><label>Display Name</label><input type="text" class="sub-name" placeholder="§a16x Res" required></div>
            </div>
            <div class="row" style="align-items: flex-end; margin-bottom:0;">
                <div class="col" style="flex: 3;"><label>Memory Tier</label><input type="number" class="sub-tier" value="0"></div>
                <button class="btn-danger" style="padding: 7px 12px;" onclick="document.getElementById('subpack-${subpackCount}').remove()">Remove</button>
            </div>`;
        document.getElementById('subpacks-container').appendChild(card);
    }

    function downloadManifest() {
        const name = document.getElementById('packName').value.trim();
        const desc = document.getElementById('packDesc').value.trim() || "Generated Manifest";
        if (!name) return alert("Please enter a Pack Name!");

        const getV = (id) => parseInt(document.getElementById(id).value) || 0;
        const version = [getV('vMaj'), getV('vMin'), getV('vPat')];
        const engineVersion = [getV('eMaj'), getV('eMin'), getV('ePat')];

        const manifest = {
            "format_version": 2,
            "header": { "description": desc, "name": name, "uuid": genUUID(), "version": version, "min_engine_version": engineVersion },
            "modules": [{ "description": desc, "type": document.getElementById('packType').value, "uuid": genUUID(), "version": version }]
        };

        const authorsInput = document.getElementById('metaAuthors').value.trim();
        const urlInput = document.getElementById('metaUrl').value.trim();
        const licenseInput = document.getElementById('metaLicense').value.trim();

        if (authorsInput || urlInput || licenseInput) {
            manifest.metadata = {};
            if (authorsInput) manifest.metadata.authors = authorsInput.split(',').map(a => a.trim()).filter(Boolean);
            if (urlInput) manifest.metadata.url = urlInput;
            if (licenseInput) manifest.metadata.license = licenseInput;
        }

        const subpackElements = document.querySelectorAll('.subpack-card');
        if (subpackElements.length > 0) {
            manifest.subpacks = [];
            subpackElements.forEach(el => {
                manifest.subpacks.push({
                    "folder_name": el.querySelector('.sub-folder').value.trim() || "default",
                    "name": el.querySelector('.sub-name').value.trim() || "Tier",
                    "memory_tier": parseInt(el.querySelector('.sub-tier').value) || 0
                });
            });
        }

        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([JSON.stringify(manifest, null, 4)], { type: "application/json" }));
        link.download = "manifest.json";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>
